version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ayeye-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ayeye
      POSTGRES_PASSWORD: ayeye_dev
      POSTGRES_DB: ayeye
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ayeye']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
